<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JPL | Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Roboto Mono", monospace;
  background:#f5f5f5;
  color:#222;
}
 
.menu{
  position:fixed;
  top:20px;
  left:20px;
  width:48px;
  height:48px;
  background:#fff;
  border:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:4000;
  transition:.3s;
}
.menu:hover{
  background:#111;
  color:#fff;
}
 
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#fff;
  border-right:1px solid #eee;
  padding-top:80px;
  transition:.4s ease;
  z-index:3000;
}
.sidebar.active{ left:0; }

.sidebar a{
  display:block;
  padding:16px 24px;
  text-decoration:none;
  color:#444;
  font-size:14px;
}
.sidebar a:hover,
.sidebar a.active{
  background:#f3f3f3;
  color:#000;
}

.close-btn{
  position:absolute;
  top:20px;
  right:20px;
  font-size:22px;
  cursor:pointer;
}
 
.contact-page{
  min-height:100vh;
  padding:120px 8% 60px;
}

.contact-label{
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#777;
  margin-bottom:15px;
}

.contact-title{
  font-family:"Playfair Display", serif;
  font-size:clamp(40px,6vw,80px);
  line-height:1.1;
  margin-bottom:25px;
}

.contact-title span{
  color:#888;
}

.contact-intro{
  max-width:650px;
  font-size:14px;
  line-height:1.8;
  color:#555;
  margin-bottom:60px;
}
 
.contact-grid{
  display:grid;
  grid-template-columns:1fr 1.2fr;
  gap:60px;
}
 
.contact-info{
  display:flex;
  flex-direction:column;
  gap:25px;
}

.info-item{
  display:flex;
  gap:15px;
  border-bottom:1px solid #ddd;
  padding-bottom:18px;
}

.info-item i{
  font-size:18px;
  margin-top:3px;
}

.info-item h3{
  font-size:13px;
  margin-bottom:6px;
}

.info-item p,
.info-item a{
  font-size:13px;
  color:#555;
  text-decoration:none;
}

.info-item a:hover{
  color:#000;
}
 
.socials{
  display:flex;
  gap:12px;
  margin-top:20px;
}

.socials a{
  width:40px;
  height:40px;
  border:1px solid #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#222;
  text-decoration:none;
  transition:.3s;
}

.socials a:hover{
  background:#111;
  color:#fff;
}
 
.contact-form{
  background:#fff;
  border:1px solid #ddd;
  padding:30px;
}

.form-group{
  margin-bottom:20px;
}

.form-group label{
  font-size:12px;
  color:#555;
}

.form-group input,
.form-group textarea{
  width:100%;
  border:none;
  border-bottom:1px solid #ccc;
  padding:10px 0;
  background:transparent;
  font-family:"Roboto Mono";
}

textarea{
  resize:none;
  min-height:120px;
}

.send-btn{
  width:100%;
  padding:14px;
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
  transition:.3s;
}

.send-btn:hover{
  background:#333;
}
 
@media(max-width:900px){
  .contact-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="menu" id="menu">☰</div>

<div class="sidebar" id="sidebar">
  <div class="close-btn" id="closeBtn">×</div>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="#">Projects</a>
  <a href="contact.html" class="active">Contact</a>
</div>

<main class="contact-page">

  <p class="contact-label">Contact</p>

  <h1 class="contact-title">
    Let’s build something <span>real.</span>
  </h1>

  <p class="contact-intro">
    Open for web development, systems, and application projects.
    Send your inquiry and I’ll get back to you.
  </p>

  <section class="contact-grid">
 
    <div class="contact-info">

      <div class="info-item">
        <i class="fa-solid fa-user"></i>
        <div>
          <h3>Name</h3>
          <p>Jona Palacio</p>
        </div>
      </div>

      <div class="info-item">
        <i class="fa-solid fa-phone"></i>
        <div>
          <h3>Phone</h3>
          <a href="tel:+63608422899">+63 608 422 899</a>
        </div>
      </div>

      <div class="info-item">
        <i class="fa-solid fa-envelope"></i>
        <div>
          <h3>Email</h3>
          <a href="mailto:jonapalacio06@gmail.com">jonapalacio06@gmail.com</a>
        </div>
      </div>

      <div class="socials">
        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#"><i class="fa-brands fa-github"></i></a>
        <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
      </div>

    </div>
 
    <form class="contact-form" action="https://formsubmit.co/jonapalacio06@gmail.com" method="POST">

      <input type="hidden" name="_subject" value="New Portfolio Inquiry">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Project</label>
        <input type="text" name="project">
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea name="message" required></textarea>
      </div>

      <button type="submit" class="send-btn">Send Message</button>
    </form>

  </section>

</main>

<script>
const menu = document.getElementById("menu");
const sidebar = document.getElementById("sidebar");
const closeBtn = document.getElementById("closeBtn");

menu.onclick = () => sidebar.classList.add("active");
closeBtn.onclick = () => sidebar.classList.remove("active");

document.querySelectorAll(".sidebar a").forEach(link=>{
  link.onclick=()=>sidebar.classList.remove("active");
});
</script>

</body>
</html>
